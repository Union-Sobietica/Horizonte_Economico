<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recomendaciones inteligentes</title>
    <link rel="stylesheet" href="/css/app.css"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- Vista Thymeleaf: recomendaciones. Renderiza datos del modelo de Spring en HTML. -->
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Horizonte Económico</h1>
            <p>Recomendaciones inteligentes</p>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <a class="link link-app" href="/usuario/resumen">Resumen individual</a>
            <a class="link link-app" href="/usuario/resumen-familia">Resumen familiar</a>
            <form action="/logout" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Generar recomendaciones</h2>

        <form class="form" id="formRecomendaciones">
            <label class="label" for="mes">Mes</label>
            <input class="input" id="mes" name="mes" type="month" required/>

            <div class="acciones">
                <button class="boton boton-primario" type="button" onclick="generarRecomendacion('general', this)">
                    Recomendación general
                </button>

                <button class="boton boton-secundario" type="button" onclick="generarRecomendacion('inversion', this)">
                    Inversión
                </button>

                <button class="boton boton-secundario" type="button" onclick="generarRecomendacion('hogar', this)">
                    Ahorro en hogar
                </button>
            </div>

            <label class="label" for="promptPersonalizadoRecomendaciones">Prompt personalizado</label>
            <textarea class="input textarea"
                      id="promptPersonalizadoRecomendaciones"
                      name="promptPersonalizado"
                      rows="5"
                      maxlength="1000"
                      placeholder="Escribe aqui que quieres preguntarle a la IA"></textarea>

            <div class="acciones">
                <button class="boton boton-primario" type="button" onclick="generarRecomendacionPersonalizada(this)">
                    Enviar prompt personalizado
                </button>
            </div>
        </form>
    </section>

    <section class="hero" id="estadoCarga" style="display:none;">
        <h2>Generando recomendaciones</h2>
        <div class="loading-box">
            <div class="spinner"></div>
            <p>Analizando tus datos financieros...</p>
        </div>
    </section>

    <section class="hero" id="bloqueError" style="display:none;">
        <h2>Error</h2>
        <p id="mensajeError" class="texto-error"></p>
    </section>

    <section class="hero" id="bloqueResultado" style="display:none;">
        <h2>Resultado</h2>
        <div id="resultadoMarkdown" class="markdown-content"></div>
    </section>
</main>

<script>
    const estadoCarga = document.getElementById('estadoCarga');
    const bloqueResultado = document.getElementById('bloqueResultado');
    const bloqueError = document.getElementById('bloqueError');
    const mensajeError = document.getElementById('mensajeError');
    const resultadoMarkdown = document.getElementById('resultadoMarkdown');
    const promptPersonalizadoRecomendaciones = document.getElementById('promptPersonalizadoRecomendaciones');

    function mostrarError(mensaje) {
        mensajeError.textContent = mensaje;
        bloqueError.style.display = 'block';
        bloqueResultado.style.display = 'none';
        estadoCarga.style.display = 'none';
    }

    async function obtenerMensajeError(response, mensajePorDefecto) {
        try {
            const data = await response.json();
            return data.mensaje || mensajePorDefecto;
        } catch (error) {
            return mensajePorDefecto;
        }
    }

    function generarRecomendacionPersonalizada(botonPulsado) {
        const promptPersonalizado = promptPersonalizadoRecomendaciones.value.trim();

        if (!promptPersonalizado) {
            mostrarError('Debes escribir un prompt personalizado.');
            return;
        }

        return generarRecomendacion('personalizado', botonPulsado, promptPersonalizado);
    }

    async function generarRecomendacion(tipo, botonPulsado, promptPersonalizado = '') {
        const mes = document.getElementById('mes').value;

        if (!mes) {
            mostrarError('Debes seleccionar un mes.');
            return;
        }

        if (promptPersonalizado.length > 1000) {
            mostrarError('El prompt personalizado no puede superar los 1000 caracteres.');
            return;
        }

        const botones = document.querySelectorAll('#formRecomendaciones button');
        botones.forEach(b => b.disabled = true);

        const textoOriginal = botonPulsado.textContent;
        botonPulsado.textContent = 'Generando...';

        bloqueResultado.style.display = 'none';
        bloqueError.style.display = 'none';
        estadoCarga.style.display = 'block';
        resultadoMarkdown.innerHTML = '';
        mensajeError.textContent = '';

        try {
            const params = new URLSearchParams({ mes, tipo });
            if (promptPersonalizado) {
                params.append('promptPersonalizado', promptPersonalizado);
            }

            const response = await fetch(`/api/v1/recomendaciones?${params.toString()}`, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(await obtenerMensajeError(response, 'No se pudieron generar las recomendaciones.'));
            }

            const data = await response.json();
            resultadoMarkdown.innerHTML = marked.parse(data.contenido || '');
            bloqueResultado.style.display = 'block';
        } catch (error) {
            mensajeError.textContent = error.message || 'Ha ocurrido un error inesperado.';
            bloqueError.style.display = 'block';
        } finally {
            estadoCarga.style.display = 'none';
            botones.forEach(b => b.disabled = false);
            botonPulsado.textContent = textoOriginal;
        }
    }
</script>
</body>
</html>
