<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro - Horizonte Económico</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>
<body>

<!-- Vista Thymeleaf: registro. Renderiza datos del modelo de Spring en HTML. -->
<header class="header header-app header-auth">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Registro</h1>
        </div>

        <nav class="nav nav-app">
            <a class="boton boton-primario" href="/login">Login</a>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Registro</h2>

        <p th:if="${errorGeneral}" class="texto-error" th:text="${errorGeneral}"></p>

        <form class="form" method="post" th:action="@{/registro}" th:object="${registroSolicitud}">
            <label class="label" for="email">Email</label>
            <input class="input" id="email" type="email" th:field="*{email}" required/>
            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

            <label class="label" for="password">Contraseña</label>
            <input class="input" id="password" type="password" th:field="*{password}" required/>
            <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            <small class="texto-ayuda">
                Debe tener entre 8 y 72 caracteres, incluir mayúsculas, minúsculas y al menos un carácter especial.
            </small>

            <label class="label" for="passwordRepetida">Repetir contraseña</label>
            <input class="input" id="passwordRepetida" type="password" th:field="*{passwordRepetida}" required/>
            <div class="error" th:if="${#fields.hasErrors('passwordRepetida')}" th:errors="*{passwordRepetida}"></div>

            <button class="boton boton-primario" type="submit">Crear cuenta</button>
        </form>
    </section>
</main>
</body>
</html>
