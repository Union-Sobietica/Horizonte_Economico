<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Resumen mensual</title>
    <link rel="stylesheet" href="/css/app.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Horizonte Económico</h1>
            <p>Resumen mensual</p>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <a class="link link-app" href="/usuario/categorias">Categorías</a>
            <a class="link link-app" href="/usuario/gastos">Gastos</a>
            <a class="link link-app" href="/usuario/ingresos">Ingresos</a>
            <form th:action="@{/logout}" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Mes</h2>

        <form class="form" th:action="@{/usuario/resumen}" method="get">
            <label class="label" for="mes">Seleccionar mes (YYYY-MM)</label>
            <input class="input" id="mes" name="mes" type="month" th:value="${mesSeleccionado}"/>
            <button class="boton boton-primario" type="submit">Actualizar</button>
        </form>
    </section>

    <section class="grid">
        <article class="card">
            <h3>Ingresos</h3>
            <p th:text="${resumen.totalIngresos}"></p>
        </article>
        <article class="card">
            <h3>Gastos</h3>
            <p th:text="${resumen.totalGastos}"></p>
        </article>
        <article class="card">
            <h3>Sobrante</h3>
            <p th:text="${resumen.sobrante}"></p>
        </article>
    </section>

    <section class="hero">
        <h2>Distribución de gastos por categoría</h2>
        <div class="chart-box">
            <canvas id="pieGastos"></canvas>
        </div>
    </section>

    <section class="hero">
        <h2>Ingresos vs Gastos por categoría</h2>
        <div class="chart-box">
            <canvas id="barraTotales"></canvas>
        </div>
    </section>
</main>

<script th:inline="javascript">
    const distribucion = /*[[${resumen.distribucionGastos}]]*/ [];
    const labelsPie = distribucion.map(x => x.categoria);
    const dataPie = distribucion.map(x => Number(x.total));

    const resumenCategorias = /*[[${resumen.resumenCategorias}]]*/ [];
    const labels = resumenCategorias.map(x => x.categoria);

    const ingresos = resumenCategorias.filter(x => x.tipo === 'INGRESO');
    const gastos = resumenCategorias.filter(x => x.tipo === 'GASTO');

    new Chart(document.getElementById('pieGastos'), {
        type: 'pie',
        data: {
            labels: labelsPie,
            datasets: [{
                data: dataPie
            }]
        }
    });

    new Chart(document.getElementById('barraTotales'), {
        type: 'bar',
        data: {
            labels,
            datasets: [
                {
                    label: 'Ingresos',
                    data: labels.map(l => {
                        const item = ingresos.find(i => i.categoria === l);
                        return item ? Number(item.total) : 0;
                    }),
                    backgroundColor: 'rgba(16, 185, 129, 0.7)',
                    borderColor: 'rgba(16, 185, 129, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                },
                {
                    label: 'Gastos',
                    data: labels.map(l => {
                        const item = gastos.find(g => g.categoria === l);
                        return item ? Number(item.total) : 0;
                    }),
                    backgroundColor: 'rgba(220, 38, 38, 0.7)',
                    borderColor: 'rgba(220, 38, 38, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
</body>
</html>
