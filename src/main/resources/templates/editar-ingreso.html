<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar ingreso</title>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<header class="header">
    <div class="contenedor">
        <div class="marca">
            <div class="logo">HE</div>
            <div class="titulo">
                <h1>Horizonte Económico</h1>
                <p>Editar ingreso</p>
            </div>
        </div>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Editar ingreso</h2>

        <form class="form" th:action="@{'/usuario/ingresos/' + ${ingresoId} + '/editar'}"
              method="post" th:object="${ingresoCrearSolicitud}">

            <label class="label" for="categoriaId">Categoría</label>
            <select class="input" id="categoriaId" th:field="*{categoriaId}" required>
                <option th:each="c : ${categoriasIngreso}" th:value="${c.id}" th:text="${c.nombre}"></option>
            </select>

            <label class="label" for="importe">Importe</label>
            <input class="input" id="importe" type="number" step="0.01" min="0.01" th:field="*{importe}" required/>

            <label class="label" for="fecha">Fecha</label>
            <input class="input" id="fecha" type="date" th:field="*{fecha}" required/>

            <label class="label" for="descripcion">Descripción</label>
            <input class="input" id="descripcion" th:field="*{descripcion}" maxlength="200"/>

            <div class="acciones">
                <button class="boton boton-primario" type="submit">Guardar cambios</button>
                <a class="boton boton-secundario" href="/usuario/ingresos">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
