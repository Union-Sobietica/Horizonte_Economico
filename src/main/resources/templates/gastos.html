<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gastos</title>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>

<!-- Vista Thymeleaf: gastos. Renderiza datos del modelo de Spring en HTML. -->
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Horizonte Económico</h1>
            <p>Gastos</p>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <a class="link link-app" href="/usuario/resumen">Resumen mensual</a>
            <a class="link link-app" href="/usuario/resumen-familia">Resumen familiar</a>
            <a class="link link-app" href="/usuario/categorias">Categorías</a>
            <a class="link link-app" href="/usuario/ingresos">Ingresos</a>
            <form th:action="@{/logout}" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Crear gasto</h2>
        <p th:if="${errorGeneral}" class="texto-error" th:text="${errorGeneral}"></p>

        <form class="form" th:action="@{/usuario/gastos}" method="post" th:object="${gastoCrearSolicitud}">
            <label class="label" for="categoriaId">Categoría</label>
            <select class="input" id="categoriaId" th:field="*{categoriaId}" required>
                <option value="" disabled selected>Selecciona una categoría</option>
                <option th:each="c : ${categoriasGasto}" th:value="${c.id}" th:text="${c.nombre}"></option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('categoriaId')}" th:errors="*{categoriaId}"></div>

            <label class="label" for="importe">Importe</label>
            <input class="input" id="importe" type="number" step="0.01" min="0.01" th:field="*{importe}" required/>
            <div class="error" th:if="${#fields.hasErrors('importe')}" th:errors="*{importe}"></div>

            <label class="label" for="fecha">Fecha</label>
            <input class="input" id="fecha" type="date" th:field="*{fecha}" required/>
            <div class="error" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>

            <label class="label" for="descripcion">Descripción (opcional)</label>
            <input class="input" id="descripcion" th:field="*{descripcion}" maxlength="200"/>

            <button class="boton boton-primario" type="submit">Guardar</button>
        </form>
    </section>

    <section class="hero">
        <h2>Listado</h2>
        <table class="tabla">
            <thead>
            <tr>
                <th>Fecha</th>
                <th>Categoría</th>
                <th>Importe</th>
                <th>Descripción</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="g : ${gastos}">
                <td th:text="${g.fecha}"></td>
                <td th:text="${g.categoria.nombre}"></td>
                <td th:text="${g.importe}"></td>
                <td th:text="${g.descripcion}"></td>
                <td class="td-accion">
                    <a class="boton boton-secundario" th:href="@{'/usuario/gastos/' + ${g.id} + '/editar'}">Editar</a>
                    <form th:action="@{'/usuario/gastos/' + ${g.id} + '/borrar'}" method="post">
                        <button class="boton boton-peligro" type="submit">Borrar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
