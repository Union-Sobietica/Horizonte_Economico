<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cambiar contraseña</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>
<body>

<!-- Vista Thymeleaf: cambiar-password. Renderiza datos del modelo de Spring en HTML. -->
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Cambiar contraseña</h1>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <form th:action="@{/logout}" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Cambiar contraseña</h2>
        <p>Debes actualizar tu contraseña antes de continuar.</p>

        <p th:if="${errorGeneral}" class="texto-error" th:text="${errorGeneral}"></p>

        <form class="form" method="post" th:action="@{/usuario/cambiar-password}" th:object="${cambiarPasswordSolicitud}">
            <label class="label" for="passwordActual">Contraseña actual</label>
            <input class="input" id="passwordActual" type="password" th:field="*{passwordActual}" required/>

            <label class="label" for="nuevaPassword">Nueva contraseña</label>
            <input class="input" id="nuevaPassword" type="password" th:field="*{nuevaPassword}" required/>
            <small class="texto-ayuda">Debe incluir mayúsculas, minúsculas y un carácter especial.</small>

            <label class="label" for="repetirNuevaPassword">Repetir nueva contraseña</label>
            <input class="input" id="repetirNuevaPassword" type="password" th:field="*{repetirNuevaPassword}" required/>

            <button class="boton boton-primario" type="submit">Actualizar contraseña</button>
        </form>
    </section>
</main>
</body>
</html>
