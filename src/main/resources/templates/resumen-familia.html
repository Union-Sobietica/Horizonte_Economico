<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Resumen familiar</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Vista Thymeleaf: resumen-familia. Renderiza datos del modelo de Spring en HTML. -->
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Resumen familiar</h1>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <a class="link link-app" href="/usuario/familia">Familia</a>
            <a class="link link-app" href="/usuario/categorias">Categorías</a>
            <a class="link link-app" href="/usuario/gastos">Gastos</a>
            <a class="link link-app" href="/usuario/ingresos">Ingresos</a>
            <form th:action="@{/logout}" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Mes</h2>
        <form class="form" th:action="@{/usuario/resumen-familia}" method="get">
            <label class="label" for="mes">Seleccionar mes</label>
            <input class="input" id="mes" name="mes" type="month" th:value="${mesSeleccionado}"/>
            <button class="boton boton-primario" type="submit">Actualizar</button>
        </form>
    </section>

    <section class="grid">
        <article class="card">
            <h3>Ingresos usuario</h3>
            <p th:text="${resumen.totalIngresosUsuario}"></p>
        </article>
        <article class="card">
            <h3>Ingresos familia (extra)</h3>
            <p th:text="${resumen.totalIngresosFamiliaresExtra}"></p>
        </article>
        <article class="card">
            <h3>Ingresos familia (total)</h3>
            <p th:text="${resumen.totalIngresosFamilia}"></p>
        </article>
        <article class="card">
            <h3>Gastos</h3>
            <p th:text="${resumen.totalGastos}"></p>
        </article>
        <article class="card">
            <h3>Sobrante familiar</h3>
            <p th:text="${resumen.sobranteFamiliar}"></p>
        </article>
    </section>

    <section class="hero">
        <h2>Distribución de gastos por categoría</h2>
        <div class="chart-box">
            <canvas id="pieGastosFam"></canvas>
        </div>
    </section>

    <section class="hero">
        <h2>Ingresos vs Gastos por categoría</h2>
        <div class="chart-box">
            <canvas id="barraTotalesFam"></canvas>
        </div>
    </section>
</main>

<!-- Datos Thymeleaf usados por JavaScript para graficas o respuestas dinamicas. -->
<script th:inline="javascript">
    const distribucion = /*[[${resumen.distribucionGastos}]]*/ [];
    const labelsPie = distribucion.map(x => x.categoria);
    const dataPie = distribucion.map(x => Number(x.total));

    const resumenCategorias = /*[[${resumen.resumenCategorias}]]*/ [];
    const labels = resumenCategorias.map(x => x.categoria);

    const ingresosUsuario = resumenCategorias.filter(x => x.tipo === 'INGRESO');
    const ingresosFamilia = resumenCategorias.filter(x => x.tipo === 'INGRESO_FAMILIAR');
    const gastos = resumenCategorias.filter(x => x.tipo === 'GASTO');

    new Chart(document.getElementById('pieGastosFam'), {
        type: 'pie',
        data: {
            labels: labelsPie,
            datasets: [{
                data: dataPie
            }]
        }
    });

    new Chart(document.getElementById('barraTotalesFam'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Ingresos usuario',
                    data: labels.map(label => {
                        const item = ingresosUsuario.find(i => i.categoria === label);
                        return item ? Number(item.total) : 0;
                    }),
                    backgroundColor: 'rgba(16, 185, 129, 0.70)',
                    borderColor: 'rgba(16, 185, 129, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                },
                {
                    label: 'Ingresos familiares extra',
                    data: labels.map(label => {
                        const item = ingresosFamilia.find(i => i.categoria === label);
                        return item ? Number(item.total) : 0;
                    }),
                    backgroundColor: 'rgba(5, 150, 105, 0.70)',
                    borderColor: 'rgba(5, 150, 105, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                },
                {
                    label: 'Gastos',
                    data: labels.map(label => {
                        const item = gastos.find(g => g.categoria === label);
                        return item ? Number(item.total) : 0;
                    }),
                    backgroundColor: 'rgba(220, 38, 38, 0.70)',
                    borderColor: 'rgba(220, 38, 38, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
</body>
</html>
