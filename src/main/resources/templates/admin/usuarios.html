<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin - Usuarios</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>
<body>

<!-- Vista Thymeleaf: usuarios. Renderiza datos del modelo de Spring en HTML. -->
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Usuarios</h1>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <a class="link link-app" href="/admin">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Usuarios</h2>

        <p th:if="${mensajeAdmin}" class="alerta-admin" th:text="${mensajeAdmin}"></p>

        <table class="tabla">
            <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Activo</th>
                <th>Alta</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.rol}"></td>
                <td th:text="${u.activo}"></td>
                <td th:text="${u.createdAt}"></td>
                <td class="td-accion">
                    <form th:action="@{'/admin/usuarios/' + ${u.id} + '/reset-password'}" method="post" style="display:inline;">
                        <button class="boton boton-secundario" type="submit">Resetear contraseña</button>
                    </form>
                    <form th:action="@{'/admin/usuarios/' + ${u.id}}" method="post" style="display:inline-grid; gap:6px;">
                        <select class="input" name="rol">
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
                                    th:selected="${r} == ${u.rol}"></option>
                        </select>
                        <select class="input" name="activo">
                            <option th:value="true" th:selected="${u.activo} == true">true</option>
                            <option th:value="false" th:selected="${u.activo} == false">false</option>
                        </select>
                        <button class="boton boton-primario" type="submit">Actualizar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
