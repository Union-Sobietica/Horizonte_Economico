<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin - Dashboard</title>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Horizonte Económico</h1>
            <p>Administración</p>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <a class="link link-app" href="/admin/usuarios">Usuarios</a>
            <form th:action="@{/logout}" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Dashboard</h2>
    </section>

    <section class="grid">
        <article class="card">
            <h3>Total usuarios</h3>
            <p th:text="${dashboard.totalUsuarios}"></p>
        </article>
        <article class="card">
            <h3>Activos</h3>
            <p th:text="${dashboard.activos}"></p>
        </article>
        <article class="card">
            <h3>Inactivos</h3>
            <p th:text="${dashboard.inactivos}"></p>
        </article>
        <article class="card">
            <h3>Admins</h3>
            <p th:text="${dashboard.admins}"></p>
        </article>
        <article class="card">
            <h3>Usuarios</h3>
            <p th:text="${dashboard.usuarios}"></p>
        </article>
    </section>
</main>
</body>
</html>
