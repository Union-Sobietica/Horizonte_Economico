<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Ayudas</title>
  <link rel="stylesheet" href="/css/app.css"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<header class="header header-app">
  <div class="contenedor header-app-inner">
    <a href="/" class="brand-link">
      <div class="brand-logo-wrap brand-logo-wrap-app">
        <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
      </div>
    </a>

    <div class="header-app-title">
      <h1>Horizonte Económico</h1>
      <p>Ayudas públicas</p>
    </div>

    <nav class="nav nav-app">
      <a class="link link-app" href="/">Inicio</a>
      <a class="link link-app" href="/usuario/resumen">Resumen individual</a>
      <a class="link link-app" href="/usuario/resumen-familia">Resumen familiar</a>
      <form action="/logout" method="post" class="form-inline">
        <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
      </form>
    </nav>
  </div>
</header>

<main class="contenedor">

  <section class="hero">
    <button id="btnGenerar" class="boton boton-primario">
      Analizar ayudas
    </button>
  </section>

  <section id="estadoCarga" style="display:none;">
    <div class="loading-box">
      <div class="spinner"></div>
      <p>Analizando situación familiar...</p>
    </div>
  </section>

  <section id="resultado" style="display:none;">
    <div id="contenido" class="markdown-content"></div>
  </section>

</main>

<script>
  const btn = document.getElementById('btnGenerar');
  const estado = document.getElementById('estadoCarga');
  const resultado = document.getElementById('resultado');
  const contenido = document.getElementById('contenido');

  btn.addEventListener('click', async () => {
    estado.style.display = 'block';
    resultado.style.display = 'none';
    btn.disabled = true;

    try {
      const res = await fetch('/api/v1/ayudas');
      const data = await res.json();

      contenido.innerHTML = marked.parse(data.contenido || '');
      resultado.style.display = 'block';
    } catch (e) {
      contenido.innerHTML = "Error al generar ayudas";
      resultado.style.display = 'block';
    } finally {
      estado.style.display = 'none';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
