<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Horizonte Económico</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>
<body>

<!-- Vista Thymeleaf: login. Renderiza datos del modelo de Spring en HTML. -->
<header class="header header-app header-auth">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Iniciar sesión</h1>
        </div>

        <nav class="nav nav-app">
            <a class="boton boton-primario" href="/registro">Registro</a>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Iniciar sesión</h2>

        <p th:if="${param.registro}" class="texto-ok">Registro completado. Inicia sesión.</p>
        <p th:if="${param.error != null and param.error[0] == 'disabled'}" class="texto-error">
            Usuario desactivado. Contacta con el administrador.
        </p>

        <p th:if="${param.error != null and param.error[0] == 'bad'}" class="texto-error">
            Credenciales incorrectas.
        </p>
        <p th:if="${param.logout}" class="texto-ok">Sesión cerrada.</p>

        <form class="form" method="post" th:action="@{/login}">
            <label class="label" for="username">Email</label>
            <input class="input" id="username" name="username" type="email" required/>

            <label class="label" for="password">Contraseña</label>
            <input class="input" id="password" name="password" type="password" required/>

            <button class="boton boton-primario" type="submit">Entrar</button>
        </form>
    </section>
</main>
</body>
</html>
