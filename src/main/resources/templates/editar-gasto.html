<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar gasto</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>
<body>

<!-- Vista Thymeleaf: editar-gasto. Renderiza datos del modelo de Spring en HTML. -->
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Editar gasto</h1>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <a class="link link-app" href="/usuario/resumen">Resumen</a>
            <a class="link link-app" href="/usuario/resumen-familia">Resumen familiar</a>
            <a class="link link-app" href="/usuario/categorias">Categorías</a>
            <a class="link link-app" href="/usuario/gastos">Gastos</a>
            <a class="link link-app" href="/usuario/ingresos">Ingresos</a>
            <form th:action="@{/logout}" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Editar gasto</h2>

        <form class="form" th:action="@{'/usuario/gastos/' + ${gastoId} + '/editar'}"
              method="post" th:object="${gastoCrearSolicitud}">

            <label class="label" for="categoriaId">Categoría</label>
            <select class="input" id="categoriaId" th:field="*{categoriaId}" required>
                <option th:each="c : ${categoriasGasto}" th:value="${c.id}" th:text="${c.nombre}"></option>
            </select>

            <label class="label" for="importe">Importe</label>
            <input class="input" id="importe" type="number" step="0.01" min="0.01" th:field="*{importe}" required/>

            <label class="label" for="fecha">Fecha</label>
            <input class="input"
                   id="fecha"
                   name="fecha"
                   type="date"
                   th:value="${gastoCrearSolicitud.fecha != null ? #temporals.format(gastoCrearSolicitud.fecha, 'yyyy-MM-dd') : ''}"
                   required/>

            <label class="label" for="descripcion">Descripción</label>
            <input class="input" id="descripcion" th:field="*{descripcion}" maxlength="200"/>

            <div class="acciones">
                <button class="boton boton-primario" type="submit">Guardar cambios</button>
                <a class="boton boton-secundario" href="/usuario/gastos">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
