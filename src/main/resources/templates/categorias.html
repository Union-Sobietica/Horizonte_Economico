<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Categorías</title>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<header class="header header-app">
    <div class="contenedor header-app-inner">
        <a href="/" class="brand-link">
            <div class="brand-logo-wrap brand-logo-wrap-app">
                <img src="/images/logo-horizonte.png" alt="Horizonte Económico" class="brand-logo"/>
            </div>
        </a>

        <div class="header-app-title">
            <h1>Horizonte Económico</h1>
            <p>Categorías</p>
        </div>

        <nav class="nav nav-app">
            <a class="link link-app" href="/">Inicio</a>
            <a class="link link-app" href="/usuario/resumen">Resumen mensual</a>
            <a class="link link-app" href="/usuario/resumen-familia">Resumen familiar</a>
            <a class="link link-app" href="/usuario/gastos">Gastos</a>
            <a class="link link-app" href="/usuario/ingresos">Ingresos</a>
            <form th:action="@{/logout}" method="post" class="form-inline">
                <button class="boton boton-peligro" type="submit">Cerrar sesión</button>
            </form>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2>Crear categoría</h2>
        <p th:if="${errorGeneral}" class="texto-error" th:text="${errorGeneral}"></p>

        <form class="form" th:action="@{/usuario/categorias}" method="post" th:object="${categoriaCrearSolicitud}">
            <label class="label" for="nombre">Nombre</label>
            <input class="input" id="nombre" th:field="*{nombre}" required maxlength="60"/>
            <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>

            <label class="label" for="tipo">Tipo</label>
            <select class="input" id="tipo" th:field="*{tipo}" required>
                <option th:each="t : ${tiposCategoria}" th:value="${t}" th:text="${t}"></option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>

            <button class="boton boton-primario" type="submit">Guardar</button>
        </form>
    </section>

    <section class="hero">
        <h2>Listado</h2>
        <table class="tabla">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Tipo</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${categorias}">
                <td th:text="${c.nombre}"></td>
                <td th:text="${c.tipo}"></td>
                <td class="td-accion">
                    <form th:action="@{'/usuario/categorias/' + ${c.id} + '/borrar'}" method="post">
                        <button class="boton boton-peligro" type="submit">Borrar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
