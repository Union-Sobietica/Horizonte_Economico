<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error</title>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>

<!-- Vista Thymeleaf: error-personalizado. Renderiza datos del modelo de Spring en HTML. -->
<header class="header">
    <div class="contenedor">
        <div class="marca">
            <div class="logo">HE</div>
            <div class="titulo">
                <h1>Horizonte Económico</h1>
                <p>Error</p>
            </div>
        </div>
    </div>
</header>

<main class="contenedor">
    <section class="hero">
        <h2 th:text="${titulo}">Error</h2>
        <p th:text="${mensaje}">Ha ocurrido un error.</p>
        <a class="boton boton-primario" href="/">Volver al inicio</a>
    </section>
</main>
</body>
</html>
