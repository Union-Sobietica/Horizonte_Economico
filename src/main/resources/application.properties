# Configuracion base compartida por todos los perfiles de Horizonte Economico.
# Define conexion, JPA/Flyway, OpenAI/OpenRouter y gestion de errores.

spring.application.name=Horizonte_Economico

spring.datasource.url=jdbc:mysql://localhost:3306/horizonte_economico?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sql123

server.port=8089

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

openai.model=openai/gpt-4o-mini
openai.base-url=https://openrouter.ai/api/v1

server.error.whitelabel.enabled=false

spring.profiles.active=local
